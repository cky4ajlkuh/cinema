server.port = 8080
spring.application.name = gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.globalcors.config.allowedOrigins=*
spring.cloud.gateway.globalcors.config.allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.config.allowedHeaders=*
spring.cloud.gateway.globalcors.config.allowCredentials=true